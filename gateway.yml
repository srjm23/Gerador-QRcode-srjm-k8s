apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: srjm-gateway-nginx
  namespace: qrcode-system
  labels:
    app: srjm
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod

spec:
  gatewayClassName: nginx

  listeners:
    - name: http
      hostname: geradorqrcode-srjm.uk
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Same

    - name: https
      hostname: geradorqrcode-srjm.uk
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: geradorqrcode-srjm.uk-tls
      allowedRoutes:
        namespaces:
          from: Same

    # Argo CD HTTP
    - name: argocd-http
      hostname: argocd.geradorqrcode-srjm.uk
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: allowed

    # Argo CD HTTPS
    - name: argocd-https
      hostname: argocd.geradorqrcode-srjm.uk
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: argocd.geradorqrcode-srjm.uk-tls
            namespace: argocd
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: allowed


    # GRAFANA HTTP
    - name: grafana-http
      hostname: grafana.geradorqrcode-srjm.uk
      port: 80
      protocol: HTTP
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: allowed

    # GRAFANA HTTPS
    - name: grafana-https
      hostname: grafana.geradorqrcode-srjm.uk
      port: 443
      protocol: HTTPS
      tls:
        mode: Terminate
        certificateRefs:
          - group: ""
            kind: Secret
            name: grafana.geradorqrcode-srjm.uk-tls
      allowedRoutes:
        namespaces:
          from: Selector
          selector:
            matchLabels:
              gateway-access: allowed