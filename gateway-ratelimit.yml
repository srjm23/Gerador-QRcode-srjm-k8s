apiVersion: gateway.nginx.org/v1alpha1
kind: RateLimitPolicy
metadata:
  name: srjm-gateway-rate-limit
  namespace: qrcode-system
spec:
  targetRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: srjm-gateway-nginx

  rateLimit:
    local:
      rules:
        - zoneSize: 10m
          key: "$binary_remote_addr"
          rate: 10r/s
          burst: 10
      rejectCode: 429
      logLevel: warn