apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: srjm-qrcode-hpa
  namespace: qrcode-system
  labels:
    app: srjm
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: srjm-qrcode

  minReplicas: 2
  maxReplicas: 5

  behavior:
    scaleUp:
      stabilizationWindowSeconds: 0
      policies:
        - type: Percent
          value: 100
          periodSeconds: 60
        - type: Pods
          value: 2
          periodSeconds: 60
      selectPolicy: Max

    scaleDown:
      stabilizationWindowSeconds: 300
      policies:
        - type: Percent
          value: 50
          periodSeconds: 60

  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 70

    - type: Resource
      resource:
        name: memory
        target:
          type: Utilization
          averageUtilization: 70